services:

  pg:
    image: postgres:17.9
    container_name: social-pg
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
      POSTGRES_DB: social
    volumes:
      - social-pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d

  adminer:
    image: adminer:5.4.2
    container_name: social-adminer
    ports:
      - 9101:8080
    depends_on:
      - pg

  pgadmin:
    image: dpage/pgadmin4:9.13.0
    container_name: social-pgadmin
    ports:
      - 9102:80
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: pgadmin@example.com
      PGADMIN_DEFAULT_PASSWORD: pgadminpassword
      PGADMIN_LISTEN_PORT: 80
    volumes:
      - social-pgadmindata:/var/lib/pgadmin
    depends_on:
      - pg

  loki:
    image: grafana/loki:3.7
    container_name: social-loki
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - ./loki-var/:/var/loki
      - ./loki-data:/loki
      - ./loki-wal:/wal
      - ./loki-tmp:/tmp
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.6
    container_name: social-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log
      - ./promtail-config.yaml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v3
    container_name: social-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    
  grafana:
    image: grafana/grafana:12.4
    container_name: social-grafana
    ports:
      - "9104:3000"
    depends_on:
      - loki
      - prometheus
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning

  pgkeycloack:
    image: postgres:17.9
    container_name: social-keycloak-pg
    restart: always
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - social-pgdata-keycloack:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    container_name: social-keycloak
    restart: always
    command:
      - start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://pgkeycloack:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak

      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      # Opcjonalnie: domena publiczna (np. za Gatewayem)
      # KC_HOSTNAME: auth.localhost

    ports:
      - 8081:8080
    depends_on:
      - pgkeycloack

  broker:
    image: apache/kafka:4.0.2
    container_name: social-kafka-broker
    restart: always
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://social-kafka-broker:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@social-kafka-broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  kafkaui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: social-kafka-ui
    ports:
      - 9103:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: social-kafka-broker:9092
    depends_on:
      - broker

  gatewayms:
    image: gateway_ms:latest
    container_name: social-gateway-ms
    restart: always
    ports:
      - 3020:3020
    logging:
      driver: json-file

  mainpagems:
    image: mainpage_ms:latest
    container_name: social-mainpage-ms
    restart: always
    logging:
      driver: json-file

  adms:
    image: ad_ms:latest
    container_name: social-ad-ms
    restart: always
    logging:
      driver: json-file

volumes:
  social-pgdata:
  social-pgadmindata:
  social-pgdata-keycloack:

