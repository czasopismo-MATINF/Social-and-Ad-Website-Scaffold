openapi: 3.0.0
info:
  title: User Page API
  version: 1.0.0

paths:
  /test_response:
    get:
      summary: Get test response.
      responses:
        '200':
          description: OK
  /page_fields_config:
    get:
      summary: Get page fields config.
      responses:
        '200':
          description: User page fields config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageFieldsConfig'
  /users/{username}:
    get:
      summary: Get user page by username.
      description: Returns the user page for a given username.
      parameters:
        - name: username
          in: path
          required: true
          description: Unique username of the user within the realm.
          schema:
            type: string
            minLength: 1
            maxLength: 256
      responses:
        '200':
          description: User page data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPage'
        '404':
          description: User not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update user page.
      description: Updates the user page attributes.
      parameters:
        - name: username
          in: path
          required: true
          description: Unique username of the user within the realm.
          schema:
            type: string
            minLength: 1
            maxLength: 256
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPage'
      responses:
        '200':
          description: User page updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPage'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized attempt to update someone else's data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /internal/users/{username}:
    get:
      summary: Get user info page by username.
      description: Returns the user info page for a given username.
      parameters:
        - name: username
          in: path
          required: true
          description: Unique username of the user within the realm.
          schema:
            type: string
      responses:
        '200':
          description: User info page data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoPage'
components:
  schemas:
    UserPage:
      type: object
      description: User with attributes.
      properties:
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/UserPageAttribute'
    UserPageAttribute:
      type: object
      description: Single attribute of the user page.
      required:
        - attributeName
        - attributeValue
      properties:
        attributeName:
          type: string
          description: Name of the attribute.
          example: "userName"
        attributeValue:
          type: string
          description: Value of the attribute.
          example: "userName"
    ErrorResponse:
      type: object
      required:
        - status
        - message
        - timestamp
      properties:
        status:
          type: integer
          format: int32
          example: 404
        message:
          type: string
          example: User not found
        timestamp:
          type: string
          format: date-time
          example: 2026-03-20T14:48:00Z
    PageFieldsConfig:
      type: object
      description: Page fields config.
      required:
        - attributes
      properties:
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/PageField'
    PageField:
      type: object
      required:
        - name
        - min
        - max
      properties:
        name:
          type: string
        min:
          type: integer
        max:
          type: integer
    UserInfoPage:
      type: object
      description: User info page for internal communication.
      required:
        - name
        - uuid
      properties:
        name:
          type: string
          description: Name of the user.
          example: "userName"
        uuid:
          type: string
          format: uuid
          description: UUID value of the user.

