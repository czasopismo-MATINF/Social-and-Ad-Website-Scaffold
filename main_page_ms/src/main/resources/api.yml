openapi: 3.0.0
info:
  title: User Page API
  version: 1.0.0

paths:
  /test_response:
    get:
      summary: Get test response
      responses:
        '200':
          description: OK
  /users/{username}:
    get:
      summary: Get user page by username
      description: >
        Returns the user page for a given username.
      parameters:
        - name: username
          in: path
          required: true
          description: Unique username of the user within the realm.
          schema:
            type: string
      responses:
        '200':
          description: User page data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPage'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    UserPage:
      type: object
      description: User with attributes.
      properties:
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/UserPageAttribute'
    UserPageAttribute:
      type: object
      description: Single attribute of the user page.
      properties:
        attributeName:
          type: string
          description: Name of the attribute.
          example: "userName"
        attributeValue:
          type: string
          description: Value of the attribute.
          example: "userName"
      required:
        - attributeName
        - attributeValue
      additionalProperties: false
    ErrorResponse:
      type: object
      required:
        - status
        - message
        - timestamp
      properties:
        status:
          type: integer
          format: int32
          example: 404
        message:
          type: string
          example: User not found
        timestamp:
          type: string
          format: date-time
          example: 2026-03-20T14:48:00Z

